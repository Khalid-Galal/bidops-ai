<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BidOps AI{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/">BidOps AI</a></h1>
            <nav>
                <a href="/">Projects</a>
                <a href="/suppliers">Suppliers</a>
                <a href="/settings">Settings</a>
                <a href="/docs" target="_blank">API Docs</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">
            BidOps AI v0.1.0 &mdash; Tender Document Intelligence
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
